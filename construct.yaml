# construct-creator · the apprenticeship pack
# ================================================================
# Authored cycle-006 L-meta-pack · 2026-04-23. Reframed 2026-04-23
# late per operator direction — shifted from "exemplar for authors"
# to "apprenticeship surface that teaches authorship."
#
# CURATOR wears two registers (focus-per-register applies per-skill,
# not per-construct — doctrine §18.3):
#
#   1. CREATING — staged dialogue guiding you through authoring a new
#      construct. Asks questions. Critiques drafts. Names what's missing.
#      Runs construct-validate as you go. The museum curator helping
#      an artist place their first work in the collection.
#
#   2. WAYFINDING — four-lens selection (knowledge · craft · depth ·
#      structure) for finding the right EXISTING construct for a task.
#      The museum curator walking you through the collection.
#
# Doctrine: [[accelerated-learning-surface]] — the primary value is the
# rate at which you accumulate name-level mastery, not only the output.
# Parallel to Claude Code's skill-creator: a construct that teaches
# construct authorship by being materially present in every decision.
#
# Distinct from construct-base (t=0 scaffold): this is the apprenticeship
# teacher that guides you from empty scaffold to published pack.
#
# Closes: F33 from cycle-005 findings
# ================================================================

schema_version: 3

name: "Construct Creator"
slug: construct-creator
version: 0.1.0

description: "Apprenticeship pack — CURATOR guides you through authoring constructs (creating register) and finds the right existing one for your task (wayfinding register). Accelerated-learning-surface doctrine: the expert is materially present in every decision."
short_description: "Apprentice authorship + wayfinding"

author: 0xHoneyJar
license: MIT
type: skill-pack
visibility: public

domain:
  - development
  - documentation

# Two skills — one per register. CURATOR switches register by skill.
# Focus-per-register (doctrine §18.3) applies: a skill loads ONE register
# cleanly. Operator picks via /create-construct vs /explore-network.
skills:
  - slug: creating-constructs
    path: skills/creating-constructs
  - slug: exploring-network
    path: skills/exploring-network

# Two slash commands bound to the two registers.
commands:
  - name: create-construct
    path: commands/create-construct.md
  - name: explore-network
    path: commands/explore-network.md

# Composition — taste stack. The operator who installs this pack gets
# the four-lens view for wayfinding AND the same four lenses informing
# the creating register (what to build, how it composes with others).
compose_with:
  - slug: hivemind
    relationship: "Knowledge lens — what does the operator already know, and where does it live in the second brain?"
  - slug: artisan
    relationship: "Craft lens — does the draft meet the standard?"
  - slug: k-hole
    relationship: "Depth lens — what's the non-obvious reference or alternative?"
  - slug: the-arcade
    relationship: "Structure lens — how does this compose with the rest of the ecosystem?"
  - slug: kansei
    relationship: "Perceptual lens — does the persona voice and skill surface feel right? (operator taste)"

# Grimoire paths. The interface IS the path (doctrine v5 §17.4).
composition_paths:
  writes:
    - grimoires/construct-creator/          # CURATOR session logs (both registers)
    - grimoires/construct-creator/drafts/   # in-flight pack drafts (creating register)
  reads:
    - grimoires/hivemind/
    - grimoires/artisan/taste.md

# Typed streams this construct consumes and produces (doctrine §3).
streams:
  reads:
    - Intent          # operator utterance — "I want to author X" / "What should I use for Y?"
    - Operator-Model  # what the operator knows — tunes depth + critique level
  writes:
    - Verdict         # creating: per-stage critique. wayfinding: curated recommendation.
    - Artifact        # creating register emits Artifacts (draft construct.yaml, draft SKILL.md, etc.)
    - Signal          # related threads surfaced during either register

repository:
  url: https://github.com/0xHoneyJar/construct-creator.git
  homepage: https://constructs.network/constructs/construct-creator

events:
  emits:
    # Creating register
    - type: forge.creator.stage_completed
      description: CURATOR (creating register) completes a stage of draft authorship with the operator
      data_schema:
        stage_name: string
        artifact_path: string
        blockers: array
    - type: forge.creator.construct_published
      description: A CURATOR-guided construct lands upstream
      data_schema:
        construct_slug: string
        repo_url: string
        stages_completed: number
    # Wayfinding register
    - type: forge.creator.construct_recommended
      description: CURATOR (wayfinding register) recommends a construct for the operator's need
      data_schema:
        target_construct_slug: string
        reasoning: string
        alternatives: array
  consumes:
    - event: forge.hivemind.concept_looked_up
      description: "Hivemind lookups feed CURATOR's ecosystem-context awareness in both registers"

# Persona handle convention (cycle-005 L3 template v3).
# ONE persona, TWO registers. Museum curators curate existing collections
# AND curate NEW works — the metaphor extends naturally. The skill picks
# the register; the persona voice is continuous.
identity:
  persona: identity/persona.yaml
  handles:
    - CURATOR

# Pack dependencies — the taste stack is load-bearing.
pack_dependencies:
  - slug: hivemind
    version: ">=0.1.0"
    source: "git+https://github.com/0xHoneyJar/hivemind.git"  # cycle-007: registry-published
    note: "URL-installed until cycle-007 pack scaffolding lands"
  - slug: artisan
    version: ">=1.0.0"
  - slug: k-hole
    version: ">=1.0.0"
  - slug: the-arcade
    version: ">=1.0.0"
  - slug: kansei
    version: ">=0.1.0"

# Butterfreezone marker — CONSTRUCT-README.md is autogenerated.
docs:
  construct_readme_generator: butterfreezone
  readme_source: hand-authored (README.md)
